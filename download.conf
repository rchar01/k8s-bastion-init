# Architecture override (auto if empty)

ARCH=amd64

# Kubernetes ecosystem
KUBECTL_VERSION=v1.29.15
HELM_VERSION=v4.1.1
K9S_VERSION=v0.50.18
STERN_VERSION=v1.33.1

# CLI utilities
JQ_VERSION=jq-1.8.1
YQ_VERSION=v4.52.4

# Registry tools
CRANE_VERSION=v0.21.1
KRANE_VERSION=v0.21.1
REGCTL_VERSION=v0.11.2
SKOPEO_VERSION=v1.22.0

# etcd
ETCD_VERSION=v3.6.8

# Container runtime stack
CONTAINERD_VERSION=v2.2.1
NERDCTL_VERSION=v2.2.1
RUNC_VERSION=v1.4.0
CNI_VERSION=v1.9.0

# Per-tool download URL templates.
# These values are sourced by bash. Use single quotes if you want variable
# references to expand later inside download.sh after ARCH resolution.
# Example mirror override:
# KUBECTL_URL='https://mirror.example/k8s/${KUBECTL_VERSION}/bin/linux/${ARCH}/kubectl'

KUBECTL_URL='https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH}/kubectl'
HELM_URL='https://get.helm.sh/helm-${HELM_VERSION}-linux-${ARCH}.tar.gz'
K9S_URL='https://github.com/derailed/k9s/releases/download/${K9S_VERSION}/k9s_Linux_${ARCH}.tar.gz'
STERN_URL='https://github.com/stern/stern/releases/download/${STERN_VERSION}/stern_${STERN_VERSION#v}_linux_${ARCH}.tar.gz'
JQ_URL='https://github.com/jqlang/jq/releases/download/${JQ_VERSION}/jq-linux-${ARCH}'
YQ_URL='https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_${ARCH}'
CRANE_URL='https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_${ARCH_X86_64}.tar.gz'
REGCTL_URL='https://github.com/regclient/regclient/releases/download/${REGCTL_VERSION}/regctl-linux-${ARCH}'
ETCD_URL='https://github.com/etcd-io/etcd/releases/download/${ETCD_VERSION}/etcd-${ETCD_VERSION}-linux-${ARCH}.tar.gz'
SKOPEO_URL='https://github.com/lework/skopeo-binary/releases/download/${SKOPEO_VERSION}/skopeo-linux-${ARCH}'
CONTAINERD_URL='https://github.com/containerd/containerd/releases/download/${CONTAINERD_VERSION}/containerd-${CONTAINERD_VERSION#v}-linux-${ARCH}.tar.gz'
NERDCTL_URL='https://github.com/containerd/nerdctl/releases/download/${NERDCTL_VERSION}/nerdctl-${NERDCTL_VERSION#v}-linux-${ARCH}.tar.gz'
RUNC_URL='https://github.com/opencontainers/runc/releases/download/${RUNC_VERSION}/runc.${ARCH}'
CNI_URL='https://github.com/containernetworking/plugins/releases/download/${CNI_VERSION}/cni-plugins-linux-${ARCH}-${CNI_VERSION}.tgz'
