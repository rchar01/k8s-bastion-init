apiVersion: bastion.access/v1
csr:
  signerName: platform.example.io/client
  ttl:
    defaultSeconds: 28800
    minSeconds: 3600
    maxSeconds: 86400
  renewal:
    thresholdSeconds: 7200
  groupPrefix: "k8s-"
bootstrap:
  ttl:
    defaultSeconds: 900
    maxSeconds: 1800
daemon:
  allowedLoginGroup: bastion-users
  socket:
    path: /run/bastion-bootstrapd/bootstrapd.sock
  request:
    maxBytes: 16384
    timeoutSeconds: 15
  rateLimit:
    failureBackoffSeconds: 60
# Test cluster configuration (mock values)
cluster:
  name: test-cluster
  server: https://test-api-server:6443
  caFile: /etc/bastion/ca.crt
# Test groups
groups:
  k8s-test-group:
    namespaces:
      - test-namespace
      - default
# Test environment - defines test users
users:
  alice:
    ensureGroups:
      - k8s-test-group
  bob:
    ensureGroups:
      - k8s-test-group
  # Added during reconcile test
  charlie:
    ensureGroups:
      - k8s-test-group
